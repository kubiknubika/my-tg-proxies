<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Свежие MTProto Прокси</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            max-width: 520px;
            margin: 24px auto;
            padding: 0 15px 40px;
            background: #e7ebf0;
            color: #111;
        }
        h2 { text-align: center; color: #2481cc; margin-bottom: 4px; }
        .subtitle {
            text-align: center; color: #666; font-size: 13px; margin-bottom: 24px;
        }
        .proxy-card {
            background: #fff;
            padding: 20px;
            margin-bottom: 14px;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(0,0,0,.08);
        }
        .proxy-info {
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: 12px;
            word-break: break-all;
        }
        .badge {
            display: inline-block;
            background: #ff6b35;
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 6px;
            margin-left: 6px;
            vertical-align: middle;
        }
        .btn {
            display: block;
            background: #2481cc;
            color: #fff;
            padding: 12px;
            text-decoration: none;
            border-radius: 8px;
            text-align: center;
            font-weight: 700;
            font-size: 15px;
        }
        .btn:hover { background: #1a6aaa; }
        .empty {
            text-align: center;
            padding: 40px 20px;
            color: #555;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h2>🚀 Свежие MTProto Прокси</h2>
    <div class="subtitle">Обновляется автоматически · 2026-05-20 18:39 UTC</div>

    <div class="proxy-card empty">
        <p>Пока нет свежих прокси.<br>Обновите страницу через минуту.</p>
    </div>
</body>
</html>
