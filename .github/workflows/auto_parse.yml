name: Auto Update Proxies Website

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Проверка репозитория
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установка библиотек
        run: pip install requests beautifulsoup4

      - name: Создать папки если нет
        run: mkdir -p data docs

      - name: Запуск парсера
        run: python update_proxies.py

      - name: Сохранение изменений
        run: |
          git config --global user.name  "GitHub Action"
          git config --global user.email "action@github.com"
          rm -f index.html
          git rm --cached index.html 2>/dev/null || true
          git add docs/index.html docs/archive.html data/proxies.json last_run.txt
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "auto: обновление прокси $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)
