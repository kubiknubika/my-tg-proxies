name: Auto Update Proxies Website

on:
  schedule:
    # Изменено на запуск в начале каждого часа (работает на бесплатных тарифах гораздо стабильнее)
    - cron: '0 * * * *'
  workflow_dispatch: # Кнопка ручного запуска

# Явно привязываем воркфлоу к ветке main для триггеров расписания
defaults:
  run:
    shell: bash

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Проверка репозитория
      uses: actions/checkout@v4
      with:
        ref: main # Явно указываем ветку

    - name: Установка Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Установка библиотек
      run: pip install requests beautifulsoup4

    - name: Запуск парсера
      run: python update_proxies.py

    - name: Сохранение изменений на сайт
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add index.html
        git diff --quiet && git diff --staged --quiet || (git commit -m "Авто-обновление прокси" && git push)
