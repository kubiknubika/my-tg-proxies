name: Auto Update Proxies Website

on:
  schedule:
    - cron: '*/30 * * * *' # Запуск каждые 30 минут автоматически
  workflow_dispatch: # Позволяет запускать вручную кнопкой

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Проверка репозитория
      uses: actions/checkout@v4

    - name: Установка Python
      uses: actions/setup-python@v5
      with:
        python-node-version: '3.10'

    - name: Установка библиотек
      run: pip install requests beautifulsoup4

    - name: Запуск парсера
      run: python update_proxies.py

    - name: Сохранение изменений на сайт
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add index.html
        git diff --quiet && git diff --staged --quiet || (git commit -m "Авто-обновление прокси" && git push)
